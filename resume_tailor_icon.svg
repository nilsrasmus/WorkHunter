<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#211C4E"/>
      <stop offset="1" stop-color="#453B8C"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFBF6"/>
      <stop offset="1" stop-color="#EFEAE0"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- soft glow -->
  <circle cx="150" cy="120" r="220" fill="#5B4FCF" opacity="0.25"/>

  <!-- resume document, slightly rotated -->
  <g transform="rotate(-6 256 266)">
    <rect x="146" y="120" width="220" height="292" rx="18" fill="url(#paper)" stroke="#D8D2C4" stroke-width="2"/>
    <path d="M 316 120 L 366 170 L 316 170 Z" fill="#E3DDD0"/>
    <rect x="172" y="176" width="120" height="10" rx="5" fill="#C9C2B2"/>
    <rect x="172" y="200" width="150" height="10" rx="5" fill="#C9C2B2"/>
    <rect x="172" y="224" width="90" height="10" rx="5" fill="#C9C2B2"/>
    <rect x="172" y="264" width="150" height="8" rx="4" fill="#DAD4C7"/>
    <rect x="172" y="284" width="130" height="8" rx="4" fill="#DAD4C7"/>
    <rect x="172" y="304" width="150" height="8" rx="4" fill="#DAD4C7"/>
    <rect x="172" y="324" width="100" height="8" rx="4" fill="#DAD4C7"/>
  </g>

  <!-- tailoring stitch line running across the resume -->
  <path d="M 150 360 Q 230 300 200 250 Q 170 200 260 170 Q 330 145 340 110"
        fill="none" stroke="url(#thread)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12"/>

  <!-- needle -->
  <g transform="translate(340 110) rotate(-35)">
    <rect x="-4" y="-46" width="8" height="70" rx="4" fill="#F4F1EA"/>
    <circle cx="0" cy="-40" r="6" fill="none" stroke="#F4F1EA" stroke-width="4"/>
  </g>

  <!-- AI spark at the needle tip -->
  <g transform="translate(352 78)">
    <path d="M0 -18 L5 -4 L18 0 L5 4 L0 18 L-5 4 L-18 0 L-5 -4 Z" fill="#7CF5D0"/>
  </g>
</svg>
